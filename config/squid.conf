# Agent Embassy - Egress Proxy Allowlist
# Only permits outbound connections to approved destinations.
# Edit this file to control what your agent can access.

# Standard ACLs
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# === ADD YOUR ALLOWED DOMAINS HERE ===
# One domain per line. Prefix with . to include subdomains.
#
# Examples:
#   acl allowed_hosts dstdomain .openai.com
#   acl allowed_hosts dstdomain api.anthropic.com
#   acl allowed_hosts dstdomain .github.com
#
acl allowed_hosts dstdomain .example.com

# Deny non-standard ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only allowlisted destinations
http_access allow allowed_hosts
http_access deny all

# Proxy port
http_port 3128

# Disable caching
cache deny all

# Hide internal network info
forwarded_for delete
via off

# Logging
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
